<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Asteroids - Atari 2600</title>
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="manifest" href="manifest-mobile.json">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
</head>
<body>

    <!-- Portrait mode overlay -->
    <div id="rotate-prompt">
        <div class="rotate-icon">⟳</div>
        <p>Rotate your device to play</p>
    </div>

    <!-- Atari 2600 console — landscape layout -->
    <div class="console">

        <!-- Left panel: wood grain top + rotate controls + switch nubs -->
        <div class="console-side console-left">
            <div class="side-header">
                <span class="atari-logo">ATARI</span>
            </div>
            <div class="side-controls">
                <button id="btn-left"  class="ctrl-btn rotate-btn" aria-label="Rotate left">&#9664;</button>
                <button id="btn-right" class="ctrl-btn rotate-btn" aria-label="Rotate right">&#9654;</button>
            </div>
            <div class="side-footer">
                <div class="switch-row">
                    <div class="switch-nub"></div>
                    <div class="switch-nub"></div>
                    <div class="switch-nub"></div>
                </div>
            </div>
        </div>

        <!-- Centre: raw gameplay canvas, full height -->
        <div class="console-centre">
            <canvas id="gameCanvas"></canvas>
            <div class="scanlines"></div>
        </div>

        <!-- Right panel: action controls + start -->
        <div class="console-side console-right">
            <div class="side-header">
                <span class="model-name">2600</span>
            </div>
            <div class="side-controls">
                <button id="btn-thrust"     class="ctrl-btn thrust-btn"  aria-label="Thrust">&#9650;</button>
                <button id="btn-fire"       class="ctrl-btn fire-btn"    aria-label="Fire">FIRE</button>
                <button id="btn-hyperspace" class="ctrl-btn hyper-btn"   aria-label="Hyperspace">WARP</button>
            </div>
            <div class="side-footer">
                <button id="btn-start" class="start-btn" aria-label="Start">START</button>
            </div>
        </div>

    </div>

    <script type="module">
        import { initMobileInput } from './dist/mobile-input.js';
        initMobileInput();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/asteroids-atari2600/sw.js');
        }
    </script>
    <script type="module" src="dist/game.js"></script>
</body>
</html>
