name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate PWA icons
        run: |
          sudo apt-get install -y librsvg2-bin
          mkdir -p icons
          rsvg-convert -w 192 -h 192 icons/icon.svg -o icons/icon-192.png
          rsvg-convert -w 512 -h 512 icons/icon.svg -o icons/icon-512.png

      - name: Prepare deploy folder
        run: |
          mkdir _deploy
          cp -r index.html mobile.html sprite-analyzer.html manifest.json manifest-mobile.json sw.js css assets dist icons _deploy/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _deploy
          clean: true
